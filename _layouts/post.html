---
layout: default
---
<div class="container" style="max-width: 720px; margin-bottom: 24px;">
    <a href="{{ '/' | relative_url }}" style="font-family: var(--font-sans); font-size: 0.85rem; color: var(--muted);">&larr; Back to Home</a>
</div>

<article class="reading-container">
    
    <header class="post-header">
        <div class="post-meta">
            <span style="color: var(--primary-color);">{{ page.categories | first }}</span> 
            &nbsp;&bull;&nbsp; 
            <span>{{ page.date | date: "%B %d, %Y" }}</span>
        </div>
        <h1 class="post-title">{{ page.title }}</h1>
    </header>

    {% if page.image %}
        <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="hero-image">
    {% endif %}

    <div class="post-content">
        {{ content }}
    </div>

</article>

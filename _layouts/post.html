---
layout: default
---
<div style="max-width: 720px; margin: 0 auto 24px auto; padding: 0 20px;">
    <a href="{{ '/' | relative_url }}" style="font-family: var(--font-sans); font-size: 0.85rem; color: var(--muted);">&larr; Back to Home</a>
</div>

<article class="reading-container">
    
    <header class="post-header">
        <span class="post-meta">{{ page.categories | first }} &nbsp;&bull;&nbsp; {{ page.date | date: "%B %d, %Y" }}</span>
        <h1 class="post-title">{{ page.title }}</h1>
    </header>

    {% if page.image %}
        <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="hero-image">
    {% endif %}

    <div class="post-content">
        {{ content }}
    </div>

</article>

<script>
  const SUPA_URL = 'YOUR_URL'
  const SUPA_KEY = 'YOUR_ANON_KEY'
  const supa = supabase.createClient(SUPA_URL, SUPA_KEY)

  async function getCurrentPractitioner() {
    const { data: { user } } = await supa.auth.getUser()
    if (!user) return null
    const { data: existing } = await supa
      .from('practitioners')
      .select('*')
      .eq('auth_id', user.id)
      .maybeSingle()
    if (existing) return existing
    const { data: created } = await supa
      .from('practitioners')
      .insert({ auth_id: user.id, email: user.email })
      .select()
      .single()
    return created ?? null
  }
</script>

    if (b === btn) b.setAttribute('aria-current','page');
    else b.removeAttribute('aria-current');

}

function generateObligations(profile) {
  // Obligation generation requires the personal tax suite data.

  return [];
}

// ══════════ SUPABASE HELPERS ══════════
const _today = () => new Date().toISOString().split('T')[0];
const _iq = id => document.getElementById(id);
const _cancelForm = id => { const el = _iq('form_' + id); if (el) el.style.display = 'none'; };
const _inlineBtn = (id, label, oc) =>
  `<button class="cbtn" style="padding:.4rem .9rem;font-size:.75rem;" onclick="${oc}">${label}</button>`;
const _cancelBtn = id =>
  `<button style="background:none;border:none;font-size:.75rem;color:var(--mu);cursor:pointer;" onclick="_cancelForm('${id}')">Cancel</button>`;

// ══════════ STATUS HELPERS ══════════
function getCardStatus(record) {
  const t = _today();
  if (!record.filed_date) return (record.due_date && record.due_date < t) ? 'overdue' : 'pending';
  if (!record.trrc_saved) return 'trrc_missing';
  if (record.has_tax_due && record.payment_status !== 'paid') return 'unpaid';
  return 'done';
}
function getStatusLabel(status) {
  return ({pending:'Not yet filed',overdue:'Overdue — not filed',trrc_missing:'Filed — TRRC needed',unpaid:'Filed — payment pending',done:'Complete'})[status] ?? status;
}
function getStatusColor(status) {
  return ({pending:'var(--mu)',overdue:'var(--red)',trrc_missing:'var(--amber)',unpaid:'var(--amber)',done:'var(--green)'})[status] ?? 'var(--mu)';
}

// ══════════ SUPABASE DATA FUNCTIONS ══════════
async function recordFiling(recordId, filedDate, reference) {
  const { error } = await supa.from('compliance_records')
    .update({ filed_date: filedDate, filing_reference: reference, updated_at: new Date().toISOString() })
    .eq('id', recordId);
  return { error };
}
async function recordTRRC(recordId, trrcDate, trrcReference) {
  const { error } = await supa.from('compliance_records')
    .update({ trrc_saved: true, trrc_date: trrcDate, trrc_reference: trrcReference, updated_at: new Date().toISOString() })
    .eq('id', recordId);
  return { error };
}
async function recordPayment(recordId, hasTaxDue, taxDue, amountPaid, paymentDate, paymentRef, paymentMode) {
  const { error } = await supa.from('compliance_records')
    .update({ has_tax_due: hasTaxDue, tax_due: taxDue, payment_status: 'paid', amount_paid: amountPaid,
              payment_date: paymentDate, payment_reference: paymentRef, payment_mode: paymentMode,
              updated_at: new Date().toISOString() })
    .eq('id', recordId);
  return { error };
}
async function seedComplianceRecords(clientId, profile) {
  const year = new Date().getFullYear();
  const obligations = (generateObligations(profile) || [])
    .filter(o => o.dueDate instanceof Date && o.dueDate.getFullYear() === year);
  if (!obligations.length) return { inserted: 0, skipped: 0 };
  const { data: existing } = await supa.from('compliance_records').select('obligation_id').eq('client_id', clientId);
  const existingIds = new Set((existing || []).map(r => r.obligation_id));
  const toInsert = obligations.filter(o => !existingIds.has(o.id)).map(o => ({
    client_id: clientId, obligation_id: o.id, form: o.form, period: o.period,
    due_date: o.dueDate.toISOString().split('T')[0], payment_status: 'n/a'
  }));
  if (toInsert.length) await supa.from('compliance_records').insert(toInsert);
  return { inserted: toInsert.length, skipped: obligations.length - toInsert.length };
}

// ══════════ CLIENT CARD ══════════
function buildClientCard(client, stats) {
  const { pending, overdue, urgent } = stats;
  let statusKey, statusLabel;
  if (overdue > 0)        { statusKey = 'overdue'; statusLabel = 'overdue'; }
  else if (urgent > 0)    { statusKey = 'urgent';  statusLabel = 'due soon'; }
  else if (pending === 0) { statusKey = 'done';    statusLabel = 'on track'; }
  else                    { statusKey = 'pending'; statusLabel = pending + ' pending'; }
  const tin   = client.tin          ? `<div class="cc-tin">TIN ${client.tin}</div>` : '';
  const badge = client.taxpayer_type ? `<span class="obf">${client.taxpayer_type}</span>` : '';
  return `<div class="client-card" data-status="${statusKey}" data-id="${client.id}" onclick="showClientDetail('${client.id}')">
  <div class="cc-left"><div class="cc-name">${client.display_name}</div>${tin}</div>
  <div class="cc-right">${badge}<span class="cc-status" data-status="${statusKey}">${statusLabel}</span></div>
</div>`;
}

// ══════════ ROSTER ══════════
let activeFilter = 'all';

async function loadRoster() {
  const practitioner = await getCurrentPractitioner();
  if (!practitioner) return;
  const today = _today();
  const week  = new Date(Date.now() + 7 * 864e5).toISOString().split('T')[0];
  const { data: clients } = await supa.from('clients').select('*')
    .eq('practitioner_id', practitioner.id).eq('is_active', true).order('display_name');
  if (!clients) return;

  const summary = { overdue: [], urgent: [], trrc: [], unpaid: [] };
  let totalUrgent = 0, totalOverdue = 0;

  const cards = await Promise.all(clients.map(async c => {
    const { data: recs } = await supa.from('compliance_records').select('*').eq('client_id', c.id);
    const r = recs || [];
    const stats = {
      total:   r.length,
      pending: r.filter(x => !x.filed_date).length,
      overdue: r.filter(x => !x.filed_date && x.due_date && x.due_date < today).length,
      urgent:  r.filter(x => !x.filed_date && x.due_date && x.due_date >= today && x.due_date <= week).length
    };
    r.forEach(x => {
      const lbl = `${c.display_name} · ${x.form || ''} · ${x.period || ''}`;
      if (!x.filed_date && x.due_date && x.due_date < today)
        summary.overdue.push({ lbl, clientId: c.id, note: 'Not filed' });
      if (!x.filed_date && x.due_date && x.due_date >= today && x.due_date <= week) {
        const days = Math.ceil((new Date(x.due_date) - new Date(today)) / 864e5);
        summary.urgent.push({ lbl, clientId: c.id, note: days === 0 ? 'Due today' : `${days}d left` });
      }
      if (x.filed_date && !x.trrc_saved)
        summary.trrc.push({ lbl, clientId: c.id, note: 'Save TRRC' });
      if (x.filed_date && x.has_tax_due && x.payment_status !== 'paid')
        summary.unpaid.push({ lbl, clientId: c.id, note: x.tax_due ? '₱' + Number(x.tax_due).toLocaleString('en-PH') : 'Unpaid' });
    });
    totalOverdue += stats.overdue > 0 ? 1 : 0;
    totalUrgent  += stats.urgent  > 0 ? 1 : 0;
    return buildClientCard(c, stats);
  }));

  const mkSection = (cls, title, items) => {
    if (!items.length) return '';
    const rows = items.map(i =>
      `<div class="rs-row" onclick="showClientDetail('${i.clientId}')">
        <span>${i.lbl}</span>
        <span style="color:var(--${cls === 'overdue' ? 'red' : 'amber'});font-weight:700;font-size:.72rem;">${i.note}</span>
      </div>`).join('');
    return `<div class="rs-section ${cls} open">
      <div class="rs-section-hdr" onclick="this.parentElement.classList.toggle('open')">
        <span>${title} <span style="font-weight:400;color:var(--mu);">(${items.length})</span></span>
        <span class="rs-chv">▾</span>
      </div><div class="rs-section-body">${rows}</div></div>`;
  };

  const sumEl = _iq('rosterSummary');
  if (sumEl) {
    const html = mkSection('overdue', 'Overdue', summary.overdue)
               + mkSection('urgent',  'Due this week', summary.urgent)
               + mkSection('urgent',  'TRRC Needed', summary.trrc)
               + mkSection('urgent',  'Payment Pending', summary.unpaid);
    sumEl.innerHTML = `<div style="padding:.6rem 1rem 0;max-width:1200px;margin:0 auto;">
      ${html || '<div class="rs-all-clear">All clients are on track ✓</div>'}
      <div class="roster-summary">${clients.length} client${clients.length !== 1 ? 's' : ''} · ${totalUrgent} due this week · ${totalOverdue} overdue</div>
    </div>`;
  }

  const list  = _iq('clientList');
  const empty = _iq('rosterEmpty');
  if (list && clients.length > 0) {
    if (empty) empty.style.display = 'none';
    list.innerHTML = cards.join('');
  }
}

function filterRoster(filterValue, searchValue) {
  const q = (searchValue || '').toLowerCase();
  document.querySelectorAll('#clientList .client-card').forEach(card => {
    const status = card.dataset.status || '';
    const name   = (card.querySelector('.cc-name')?.textContent || '').toLowerCase();
    const tin    = (card.querySelector('.cc-tin')?.textContent  || '').toLowerCase();
    const matchFilter =
      filterValue === 'overdue' ? status === 'overdue' :
      filterValue === 'urgent'  ? status === 'urgent'  :
      filterValue === 'active'  ? status !== 'overdue' : true;
    card.classList.toggle('hidden', !(matchFilter && (!q || name.includes(q) || tin.includes(q))));
  });
}

(function wireRosterControls() {
  const search = _iq('rosterSearch');
  if (search) search.addEventListener('input', function() { filterRoster(activeFilter, this.value); });
  document.querySelectorAll('#pgRoster .vt button').forEach(btn => {
    btn.addEventListener('click', function() {
      activeFilter = this.dataset.filter || 'all';
      document.querySelectorAll('#pgRoster .vt button').forEach(b => {
        b.classList.remove('act'); b.setAttribute('aria-selected', 'false');
      });
      this.classList.add('act'); this.setAttribute('aria-selected', 'true');
      filterRoster(activeFilter, search ? search.value : '');
    });
  });
})();

function goAddStep2() {

  err.style.display = 'none';
  _iq('addStep1').style.display = 'none';

}
function goAddStep1() {
  _iq('addStep2').style.display = 'none';

}
async function saveClient() {
  const btn = document.querySelector('#addStep2 .cbtn');
  const err = _iq('addClientError');
  const val = id => (_iq(id).value || '').trim();
  const practitioner = await getCurrentPractitioner();
  if (!practitioner) { err.textContent = 'Not signed in.'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Saving…'; err.style.display = 'none';
  const taxpayer_type      = val('ac_taxpayer_type');
  const vat_status         = val('ac_vat_status');
  const fiscal_start_month = parseInt(_iq('ac_fiscal_start_month').value);
  const { data: newClient, error } = await supa.from('clients').insert({
    practitioner_id: practitioner.id,
    display_name:    val('ac_display_name'),
    tin:             val('ac_tin')      || null,
    rdo_code:        val('ac_rdo_code') || null,
    industry:        val('ac_industry') || null,

  }).select().single();
  btn.disabled = false; btn.textContent = 'Save Client';
  if (error) { err.textContent = error.message; err.style.display = 'block'; return; }
  await seedComplianceRecords(newClient.id, { taxpayer_type, vat_status, fiscal_start_month, regime: vat_status });
  _iq('addClientSheet').classList.remove('vis');
  loadRoster();
}
(function wireAddClient() {
  const addBtn = _iq('addClientBtn');
  if (addBtn) addBtn.onclick = openAddClient;
})();

// ══════════ CLIENT DETAIL ══════════
let activeClientId = null;

async function showClientDetail(clientId) {
  activeClientId = clientId;
  showPg('client', null);
  const { data: client } = await supa.from('clients').select('*').eq('id', clientId).single();
  if (!client) return;
  const nameEl = _iq('clientDetailName');
  if (nameEl) nameEl.textContent = client.display_name;
  const metaParts = [];
  if (client.tin)        metaParts.push('TIN: ' + client.tin);
  if (client.rdo_code)   metaParts.push('RDO: ' + client.rdo_code);
  if (client.vat_status) metaParts.push(client.vat_status);
  const metaEl = _iq('clientDetailMeta');
  if (metaEl) metaEl.textContent = metaParts.join(' · ');
  loadObligations(clientId);
  loadClientNotes();
}

async function loadObligations(clientId) {
  const panel = _iq('obligationsPanel');
  if (!panel) return;
  const { data: records } = await supa.from('compliance_records').select('*')
    .eq('client_id', clientId).order('due_date', { ascending: true });
  if (!records || !records.length) {
    panel.innerHTML = '<div class="cr-empty">No obligations on record.</div>';
    return;
  }
  panel.innerHTML = records.map(buildObligationCard).join('');
}

function buildObligationCard(r) {
  const status = getCardStatus(r);
  const color  = getStatusColor(status);
  const label  = getStatusLabel(status);
  const chk  = '<span style="color:var(--green);font-size:.85rem;">✓</span>';
  const circ = '<span style="color:var(--bl);font-size:.85rem;">○</span>';
  const dim  = 'opacity:.4;pointer-events:none;';
  const filedRow = `<div style="display:flex;align-items:center;gap:.5rem;font-size:.78rem;padding:.18rem 0;">
    ${r.filed_date ? chk : circ}<span style="color:var(--ch);">Filed</span>
    ${r.filed_date ? `<span style="color:var(--mu);">${r.filed_date}${r.filing_reference ? ' · ' + r.filing_reference : ''}</span>` : ''}
  </div>`;
  const trrcRow = `<div style="display:flex;align-items:center;gap:.5rem;font-size:.78rem;padding:.18rem 0;${r.filed_date ? '' : dim}">
    ${r.trrc_saved ? chk : circ}<span style="color:var(--ch);">TRRC</span>
    ${r.trrc_saved ? `<span style="color:var(--mu);">${r.trrc_date || ''}${r.trrc_reference ? ' · ' + r.trrc_reference : ''}</span>` : ''}
  </div>`;
  const payNA  = !r.has_tax_due || r.payment_status === 'n/a';
  const payRow = `<div style="display:flex;align-items:center;gap:.5rem;font-size:.78rem;padding:.18rem 0;${r.filed_date ? '' : dim}">
    ${payNA ? '<span style="color:var(--mu);">—</span>' : r.payment_status === 'paid' ? chk : circ}
    <span style="color:var(--ch);">Payment</span>
    ${payNA ? '<span style="color:var(--mu);">N/A</span>'
            : r.payment_status === 'paid'
              ? `<span style="color:var(--mu);">${r.payment_date || ''}${r.amount_paid ? ' · ₱' + Number(r.amount_paid).toLocaleString('en-PH') : ''}</span>`
              : `<span style="color:var(--mu);">${r.tax_due ? '₱' + Number(r.tax_due).toLocaleString('en-PH') + ' due' : ''}</span>`}
  </div>`;
  const actions = {
    pending:      `<button class="cbtn" style="font-size:.72rem;padding:.35rem .9rem;margin-top:.5rem;" onclick="openFilingForm('${r.id}')">Mark as Filed</button>`,
    overdue:      `<button class="cbtn" style="font-size:.72rem;padding:.35rem .9rem;margin-top:.5rem;background:var(--red);" onclick="openFilingForm('${r.id}')">Mark as Filed</button>`,
    trrc_missing: `<button class="cbtn" style="font-size:.72rem;padding:.35rem .9rem;margin-top:.5rem;background:var(--amber);" onclick="openTRRCForm('${r.id}')">Save TRRC</button>`,
    unpaid:       `<button class="cbtn" style="font-size:.72rem;padding:.35rem .9rem;margin-top:.5rem;background:var(--amber);" onclick="openPaymentForm('${r.id}')">Record Payment</button>`,
    done: ''
  };
  return `<div class="ob" style="border-left-color:${color};margin-bottom:.5rem;">
  <div class="obt">
    <div><span class="obn">${r.form || ''}</span> <span class="obds">${r.period || ''}</span></div>
    <span style="font-size:.72rem;font-weight:700;color:${color};">${label}</span>
  </div>
  <div style="margin-top:.4rem;">${filedRow}${trrcRow}${payRow}</div>
  ${actions[status] || ''}
  <div id="form_${r.id}" style="display:none;"></div>
</div>`;
}

function backToRoster() {
  showPg('roster', document.querySelector('.pnav button[data-pg="roster"]') ||
                   document.querySelector('.btmnav button[data-pg="roster"]'));
}
function showSubtab(btn) {
  ['obligations','history','notes'].forEach(id => {
    const panel = _iq(id + 'Panel');
    if (panel) panel.style.display = id === btn.dataset.subtab ? '' : 'none';
  });
  document.querySelectorAll('#pgClient .vt button').forEach(b => {
    b.classList.toggle('act', b === btn);
    b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
  });
  if (btn.dataset.subtab === 'notes')   loadClientNotes();
  if (btn.dataset.subtab === 'history') loadHistory();
}

// ══════════ INLINE FILING FORMS ══════════
function _showInlineForm(recordId, html) {
  document.querySelectorAll('[id^="form_"]').forEach(el => {
    if (el.id !== 'form_' + recordId) el.style.display = 'none';
  });
  const el = _iq('form_' + recordId);
  if (!el) return;
  el.innerHTML = html;
  el.style.display = 'block';
}
async function _saveFilingForm(recordId) {
  const noTax = _iq('ff_notax_' + recordId).checked;
  await recordFiling(recordId, _iq('ff_date_' + recordId).value, _iq('ff_ref_' + recordId).value);
  if (noTax) await recordPayment(recordId, false, 0, 0, null, null, null);
  await loadObligations(activeClientId);
}
async function _saveTRRCForm(recordId) {
  await recordTRRC(recordId, _iq('tf_date_' + recordId).value, _iq('tf_ref_' + recordId).value);
  await loadObligations(activeClientId);
}
async function _savePaymentForm(recordId) {
  const amt = parseFloat(_iq('pf_amt_' + recordId).value) || 0;
  await recordPayment(recordId, true, amt, amt, _iq('pf_date_' + recordId).value,
    _iq('pf_ref_' + recordId).value, _iq('pf_mode_' + recordId).value);
  await loadObligations(activeClientId);
}
function openFilingForm(recordId) {
  const t = _today();
  _showInlineForm(recordId, `<div class="inline-form">
    <label>Date Filed</label><input type="date" id="ff_date_${recordId}" value="${t}">
    <label>Confirmation No.</label><input type="text" id="ff_ref_${recordId}" placeholder="eBIRForms confirmation no.">
    <label style="display:flex;align-items:center;gap:.4rem;margin-bottom:.4rem;cursor:pointer;">
      <input type="checkbox" id="ff_notax_${recordId}" style="width:auto;margin:0;"
        onchange="_iq('ff_taxwrap_${recordId}').style.display=this.checked?'none':''">
      No tax due
    </label>
    <div id="ff_taxwrap_${recordId}">
      <label>Tax Due (₱)</label><input type="number" id="ff_taxdue_${recordId}" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="inline-form-btns">
      ${_inlineBtn(recordId, 'Save', `_saveFilingForm('${recordId}')`)}
      ${_cancelBtn(recordId)}
    </div>
  </div>`);
}
function openTRRCForm(recordId) {
  _showInlineForm(recordId, `<div class="inline-form">
    <label>TRRC Date</label><input type="date" id="tf_date_${recordId}" value="${_today()}">
    <label>TRRC Reference</label><input type="text" id="tf_ref_${recordId}" placeholder="TRRC number or filename">
    <div class="inline-form-btns">
      ${_inlineBtn(recordId, 'Save', `_saveTRRCForm('${recordId}')`)}
      ${_cancelBtn(recordId)}
    </div>
  </div>`);
}
function openPaymentForm(recordId) {
  _showInlineForm(recordId, `<div class="inline-form">
    <label>Amount Paid (₱)</label><input type="number" id="pf_amt_${recordId}" placeholder="0.00" min="0" step="0.01">
    <label>Payment Date</label><input type="date" id="pf_date_${recordId}" value="${_today()}">
    <label>Reference No.</label><input type="text" id="pf_ref_${recordId}" placeholder="GCash ref, bank ref, AAB receipt no.">
    <label>Payment Mode</label>
    <select id="pf_mode_${recordId}">
      <option>eFPS</option><option>GCash</option><option>Bank (AAB)</option><option>Over-the-counter (RDO)</option>
    </select>
    <div class="inline-form-btns">
      ${_inlineBtn(recordId, 'Save', `_savePaymentForm('${recordId}')`)}
      ${_cancelBtn(recordId)}
    </div>
  </div>`);
}

// ══════════ NOTES & HISTORY ══════════
async function loadClientNotes() {
  const { data } = await supa.from('clients').select('notes').eq('id', activeClientId).single();
  const el = _iq('clientNotes');
  if (el) el.value = data?.notes ?? '';
}
async function saveClientNotes() {
  const el = _iq('clientNotes');
  if (!el || !activeClientId) return;
  await supa.from('clients').update({ notes: el.value, updated_at: new Date().toISOString() }).eq('id', activeClientId);
  el.classList.add('notes-saved');
  setTimeout(() => el.classList.remove('notes-saved'), 800);
}
async function loadHistory() {
  const panel = _iq('historyPanel');
  if (!panel) return;
  const { data: records } = await supa.from('compliance_records')
    .select('form,period,filed_date,trrc_saved,payment_status,amount_paid')
    .eq('client_id', activeClientId).not('filed_date', 'is', null)
    .order('filed_date', { ascending: false });
  if (!records?.length) { panel.innerHTML = '<div class="cr-empty">No filed returns yet.</div>'; return; }
  panel.innerHTML = `<table class="ct"><thead><tr>
    <th>Form</th><th>Period</th><th>Filed Date</th><th>TRRC</th><th>Payment</th><th>Amount Paid</th>
  </tr></thead><tbody>${records.map(r => `<tr>
    <td>${r.form||'—'}</td><td>${r.period||'—'}</td><td>${r.filed_date||'—'}</td>
    <td>${r.trrc_saved?'✓':'—'}</td><td>${r.payment_status||'—'}</td>
    <td>${r.amount_paid!=null?'₱'+Number(r.amount_paid).toLocaleString('en-PH'):'—'}</td>
  </tr>`).join('')}</tbody></table>`;
}

// ══════════ AUTH SHEET ══════════
function openSheet(id) {
  const ov = _iq(id);
  if (!ov) return;
  ov.classList.add('vis');
  document.addEventListener('keydown', _loginSheetKeyHandler);
  setTimeout(() => { const f = ov.querySelector('.sheet-x'); if (f) try { f.focus(); } catch(e) {} }, 40);
}
function closeSheet(id) {
  const ov = _iq(id);
  if (!ov) return;
  ov.classList.remove('vis');
  document.removeEventListener('keydown', _loginSheetKeyHandler);
}
function _loginSheetKeyHandler(e) { if (e.key === 'Escape') closeSheet('loginSheet'); }

async function handleLoginSubmit() {
  const emailEl = _iq('loginEmail');
  const msgEl   = _iq('loginMsg');
  const btn     = _iq('loginSubmit');
  const email   = (emailEl.value || '').trim();
  if (!email) return;
  btn.disabled = true; btn.textContent = 'Sending…'; msgEl.style.display = 'none';
  const { error } = await supa.auth.signInWithOtp({ email });
  btn.disabled = false; btn.textContent = 'Send sign-in link';
  msgEl.style.display = 'block';
  if (error) {
    msgEl.style.color = 'var(--red)';
    msgEl.textContent = error.message || 'Something went wrong. Please try again.';
  } else {
    msgEl.style.color = 'var(--green)';
    msgEl.textContent = 'Check your email for the link.';
    emailEl.value = '';
  }
}

function updateAuthUI(session) {
  document.querySelectorAll('.pnav button[data-pg="roster"],.btmnav button[data-pg="roster"]').forEach(b => {
    b.classList.toggle('hidden', !session);
  });
  if (session) loadRoster();
}

supa.auth.onAuthStateChange((event, session) => {
  if (session) closeSheet('loginSheet');
  updateAuthUI(session);
});
supa.auth.getSession().then(({ data: { session } }) => updateAuthUI(session));


// Show sign-in button if not logged in
supa.auth.getSession().then(({ data: { session } }) => {
  const btn = document.getElementById('signInBtn');
  const emailEl = document.getElementById('userEmail');
  if (!session) {
    if (btn) btn.style.display = '';
  } else {
    if (emailEl) { emailEl.textContent = session.user.email; emailEl.style.display = ''; }
  }
});

// Show roster page by default
(function init() {
  const pg = document.getElementById('pgRoster');
  if (pg) pg.classList.add('vis');
})();
</script>
